name: real-time-updates-disable
type: script
_id: nQ22UAD8f0JG7yxi
author: 8NIcTpJ3QR1Fa2De
img: icons/svg/cancel.svg
scope: global
command: |-
  /*
  This macro disables the real time updates feature.
  */

  function stopRealTimeSync() {
     intervalId = game.user.getFlag('jd-easytimekeeping', 'real-time-interval-id')
     if (intervalId) {
       console.log("Stopping real time updates")
       clearInterval(intervalId)
       game.user.unsetFlag('jd-easytimekeeping', 'real-time-interval-id')
     }
  }

  stopRealTimeSync()
