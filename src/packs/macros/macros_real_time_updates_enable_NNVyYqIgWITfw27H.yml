name: real-time-updates-enable
type: script
_id: NNVyYqIgWITfw27H
author: 8NIcTpJ3QR1Fa2De
img: icons/svg/wingfoot.svg
scope: global
command: >-
  /*

  This macro will begin updating the Easy Timekeeping time based on the real
  time.

  Note that it doesn't pause for combat or the Game Paused feature. Those will

  have to wait for a future in-module implementation.


  Disable the updates by running the `real-time-updates-disable` macro, 

  or by reloading your Foundry session.


  Power-users can control the speed of updates and the ratio of real to game
  time

  with the variables UPDATE_INTERVAL_SECONDS and GAME_TO_REAL_TIME_RATIO. 

  These should multiply to an integer multiple of 60 for the best results, due
  to how 

  the module works internally.

  */


  function startRealTimeSync(intervalSeconds, callback) {
    // Stop any existing interval, valid or stale - always safe
    const existingId = game.user.getFlag('jd-easytimekeeping', 'real-time-interval-id')
    if (existingId) clearInterval(existingId)

    const intervalId = setInterval(() => {
      const now = new Date()
      callback(now.getHours(), now.getMinutes())
    }, intervalSeconds * 1000)

    game.user.setFlag('jd-easytimekeeping', 'real-time-interval-id', intervalId)
  }


  // How often the time is updated. Since Easy Timekeeping doesn't display
  seconds, 

  // there's little benefit when UPDATE_INTERVAL_SECONDS *
  GAME_TO_REAL_TIME_RATIO < 60 

  const UPDATE_INTERVAL_SECONDS = 10


  // the ratio of game time to real time.

  // With this value of 6 and the update interval of 10, the result is that game
  time advances 

  // 1 minute (6 * 10 = 60 seconds) every 10 seconds

  const GAME_TO_REAL_TIME_RATIO = 6  


  // Game time advances at 4 x real time:

  // const UPDATE_INTERVAL_SECONDS = 15

  // const GAME_TO_REAL_TIME_RATIO = 4


  // Game time advances at twice real time:

  // const UPDATE_INTERVAL_SECONDS = 30

  // const GAME_TO_REAL_TIME_RATIO = 2


  // Game time advances at the same rate as real time:

  // const UPDATE_INTERVAL_SECONDS = 60

  // const GAME_TO_REAL_TIME_RATIO = 1


  startRealTimeSync(UPDATE_INTERVAL_SECONDS, (hours, minutes) => {
    //console.log("Real time update: %d:%d", hours, minutes)
    const incrementalMinutes = GAME_TO_REAL_TIME_RATIO * UPDATE_INTERVAL_SECONDS / 60
    console.log("Incrementing minutes by %d", incrementalMinutes)
    game.modules.get('jd-easytimekeeping').api.increment({minutes: incrementalMinutes})
  })
