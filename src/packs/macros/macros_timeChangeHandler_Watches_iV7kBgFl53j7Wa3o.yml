command: >-
  /*

  Easy Timekeeping time changed handler that checks for a number of watches per
  day, 

  posting a message to chat when the watch changes.

  */


  // number of watches per day. Should be evenly divisible into 24

  // 6 watches, 4 hours duration each

  const watchesPerDay = 6

  const hoursPerWatch = 24 / watchesPerDay

  console.log(time.hours, watchesPerDay, hoursPerWatch)


  const lastWatch = Math.floor(oldTime.hours / hoursPerWatch) + 1

  const currentWatch = Math.floor(time.hours / hoursPerWatch) + 1  // Add one so
  the first watch is numbered as 1, not 0

  console.log(lastWatch, currentWatch)


  // If the current watch is different to the last watch, then post a chat
  message

  if (currentWatch != lastWatch) {
    const theTime = game.modules.get('jd-easytimekeeping').api.formatTime(time.totalMinutes)
    ChatMessage.create({
      speaker: { actor: game.user.id },
      content: `Watch ${currentWatch}, ${theTime}.` ,
    })
  }
