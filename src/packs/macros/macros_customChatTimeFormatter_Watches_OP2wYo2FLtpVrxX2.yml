folder: xlLoJkaTQWQ6W1pn
name: customChatTimeFormatter-Watches
type: script
author: 8NIcTpJ3QR1Fa2De
img: icons/svg/dice-target.svg
scope: global
command: |-
  /* 
   Time chat formatter that matches the message in timeChangeHandler-Watches.
   This macro formats the message when the UI button is pressed.
  */
  if (game.modules.get('jd-easytimekeeping').api) {
      const watchesPerDay = 6
      const hoursPerWatch = 24 / watchesPerDay
      const currentWatch = Math.floor(time.hours / hoursPerWatch) + 1
    
      return `Watch ${currentWatch}, ${game.modules.get('jd-easytimekeeping').api.formatTime(time.totalMinutes)}.` 
  } else {
      return false
  }
